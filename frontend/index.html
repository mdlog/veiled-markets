<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Veiled Markets - Privacy-preserving prediction market built on Aleo blockchain. Predict freely, bet privately." />
  <meta name="theme-color" content="#08090c" />

  <!-- Fonts: DM Serif Display (display) + Instrument Sans (headings) + Inter (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <title>Veiled Markets | Predict Freely. Bet Privately.</title>

  <script>
    // Prevent FOUC: apply saved theme before first paint
    (function() {
      try {
        var stored = JSON.parse(localStorage.getItem('veiled-markets-ui') || '{}');
        var theme = (stored.state && stored.state.theme) || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.toggle('light', theme === 'light');
      } catch(e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* Prevent FOUC */
    html.dark { background: #08090c; }
    html.light { background: #f8f9fb; }
  </style>
</head>

<body class="bg-surface-950 text-white antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
